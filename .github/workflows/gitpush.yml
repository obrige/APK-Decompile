name: "Git推送指定仓库"

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源仓库地址(完整URL，如https://github.com/user/repo.git)'
        required: true
      commit_hash:
        description: '要提取的提交哈希(留空则使用最新提交，支持短哈希/分支/tag)'
        required: false
        default: ''
      target_repo:
        description: '目标仓库(简写如repo，或完整格式owner/repo)'
        required: true
      version:
        description: '版本号(可选，如v1.0.0，会自动创建Git Tag)'
        required: false
        default: ''
      create_repo:
        description: '若目标仓库不存在是否自动创建'
        required: false
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
      private_repo:
        description: '自动创建时是否为私有仓库'
        required: false
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'
      rename_from:
        description: '原项目名(自动处理大小写变体)'
        required: false
        default: ''
      rename_to:
        description: '新项目名(自动处理大小写变体)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: gitpush-${{ github.event.inputs.target_repo }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: 校验输入
        id: validate
        run: |
          if [[ ! "$SOURCE_REPO" =~ ^https://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(\.git)?$ ]]; then
            echo "::error::source_repo格式无效，必须是https://github.com/owner/repo[.git]"
            exit 1
          fi

          INPUT="$TARGET_REPO"
          if [[ "$INPUT" == *"/"* ]]; then
            FULL_NAME="$INPUT"
          else
            FULL_NAME="${{ github.actor }}/$INPUT"
          fi

          if [[ ! "$FULL_NAME" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::target_repo格式无效：$FULL_NAME"
            exit 1
          fi

          echo "full_name=$FULL_NAME" >> "$GITHUB_OUTPUT"
          echo "✅输入校验通过"
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          TARGET_REPO: ${{ inputs.target_repo }}

      - name: 确认目标仓库
        id: target
        run: |
          FULL_NAME="${{ steps.validate.outputs.full_name }}"
          OWNER="${FULL_NAME%%/*}"
          REPO="${FULL_NAME#*/}"

          echo "📤目标仓库：$FULL_NAME"

          if gh repo view "$FULL_NAME" &>/dev/null; then
            echo "✅仓库已存在"
            echo "existed=true" >> "$GITHUB_OUTPUT"
          else
            if [ "$CREATE_REPO" = "true" ]; then
              echo "🏗️仓库不存在，正在创建..."
              VISIBILITY="--public"
              if [ "$PRIVATE_REPO" = "true" ]; then
                VISIBILITY="--private"
              fi
              gh repo create "$FULL_NAME" $VISIBILITY --clone=false --confirm
              echo "✅仓库已创建"
              echo "existed=false" >> "$GITHUB_OUTPUT"
            else
              echo "::error::目标仓库不存在且未开启自动创建"
              exit 1
            fi
          fi
        env:
          CREATE_REPO: ${{ inputs.create_repo }}
          PRIVATE_REPO: ${{ inputs.private_repo }}

      - name: 提取源码
        id: extract
        run: |
          set -euo pipefail
          SRC_DIR=$(mktemp -d)
          echo "src_dir=$SRC_DIR" >> "$GITHUB_OUTPUT"

          echo "📥源仓库：$SOURCE_REPO"
          git clone --bare "$SOURCE_REPO" "$SRC_DIR/repo.git"
          cd "$SRC_DIR/repo.git"

          if [ -z "$COMMIT_HASH" ]; then
            echo "🔖使用默认分支最新提交"
            FULL_HASH=$(git rev-parse HEAD)
          else
            echo "🔖解析引用：$COMMIT_HASH"
            FULL_HASH=$(git rev-parse --verify "$COMMIT_HASH" 2>/dev/null \
              || git rev-parse --verify "origin/$COMMIT_HASH" 2>/dev/null \
              || git rev-parse --verify "refs/tags/$COMMIT_HASH" 2>/dev/null \
              || echo "")
            if [ -z "$FULL_HASH" ]; then
              echo "::error::无法解析引用：$COMMIT_HASH"
              exit 1
            fi
          fi

          echo "✅解析到提交：$FULL_HASH"
          echo "full_hash=$FULL_HASH" >> "$GITHUB_OUTPUT"

          ORIG_MSG=$(git log -1 --format='%s' "$FULL_HASH")
          echo "orig_msg=$ORIG_MSG" >> "$GITHUB_OUTPUT"

          EXPORT_DIR="$SRC_DIR/export"
          mkdir -p "$EXPORT_DIR"
          git --work-tree="$EXPORT_DIR" checkout "$FULL_HASH" -- .

          echo "✅源码提取完成"
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          COMMIT_HASH: ${{ inputs.commit_hash }}

      - name: 重命名项目
        if: ${{ inputs.rename_from != '' && inputs.rename_to != '' }}
        run: |
          set -euo pipefail
          FROM="$RENAME_FROM"
          TO="$RENAME_TO"
          FROM_LOWER=$(echo "$FROM" | tr '[:upper:]' '[:lower:]')
          FROM_UPPER=$(echo "$FROM" | tr '[:lower:]' '[:upper:]')
          TO_LOWER=$(echo "$TO" | tr '[:upper:]' '[:lower:]')
          TO_UPPER=$(echo "$TO" | tr '[:lower:]' '[:upper:]')

          EXPORT_DIR="${{ steps.extract.outputs.src_dir }}/export"
          echo "🔄重命名：$FROM → $TO（含 $FROM_LOWER/$FROM_UPPER 变体）"

          # 替换精确大小写
          count=$(grep -rlIF "$FROM" "$EXPORT_DIR" 2>/dev/null | wc -l)
          grep -rlIF "$FROM" "$EXPORT_DIR" 2>/dev/null | xargs -r sed -i "s|$FROM|$TO|g"
          echo "  $FROM → $TO：$count 个文件"

          # 替换小写
          if [ "$FROM_LOWER" != "$FROM" ]; then
            count=$(grep -rlIF "$FROM_LOWER" "$EXPORT_DIR" 2>/dev/null | wc -l)
            grep -rlIF "$FROM_LOWER" "$EXPORT_DIR" 2>/dev/null | xargs -r sed -i "s|$FROM_LOWER|$TO_LOWER|g"
            echo "  $FROM_LOWER → $TO_LOWER：$count 个文件"
          fi

          # 替换大写
          if [ "$FROM_UPPER" != "$FROM" ] && [ "$FROM_UPPER" != "$FROM_LOWER" ]; then
            count=$(grep -rlIF "$FROM_UPPER" "$EXPORT_DIR" 2>/dev/null | wc -l)
            grep -rlIF "$FROM_UPPER" "$EXPORT_DIR" 2>/dev/null | xargs -r sed -i "s|$FROM_UPPER|$TO_UPPER|g"
            echo "  $FROM_UPPER → $TO_UPPER：$count 个文件"
          fi

          echo "✅重命名完成"
        env:
          RENAME_FROM: ${{ inputs.rename_from }}
          RENAME_TO: ${{ inputs.rename_to }}

      - name: 推送到目标仓库
        run: |
          set -euo pipefail

          FULL_NAME="${{ steps.validate.outputs.full_name }}"
          FULL_HASH="${{ steps.extract.outputs.full_hash }}"
          EXPORT_DIR="${{ steps.extract.outputs.src_dir }}/export"

          GIT_USER_NAME=$(gh api user -q '.login')
          GIT_USER_ID=$(gh api user -q '.id')
          GIT_USER_EMAIL="${GIT_USER_ID}+${GIT_USER_NAME}@users.noreply.github.com"
          echo "👤提交身份：$GIT_USER_NAME <$GIT_USER_EMAIL>"

          PUSH_DIR=$(mktemp -d)
          cp -a "$EXPORT_DIR/." "$PUSH_DIR/"

          cd "$PUSH_DIR"
          git init -b main
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git add .

          if [ -n "$VERSION" ]; then
            COMMIT_MSG="release: $VERSION"
          else
            COMMIT_MSG="${{ steps.extract.outputs.orig_msg }}"
          fi

          git commit -m "$COMMIT_MSG" || {
            echo "⚠️无文件变更，跳过推送"
            exit 0
          }

          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/${FULL_NAME}.git"
          git remote add origin "$AUTH_URL"
          git push -u origin main --force

          if [ -n "$VERSION" ]; then
            echo "🏷️创建Tag：$VERSION"
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION" --force || echo "⚠️Tag推送失败（可能权限不足）"
          fi

          echo ""
          echo "🎉推送完成"
          echo "📤仓库：$FULL_NAME(main)"
          echo "👤提交者：$GIT_USER_NAME"
          echo "📝信息：$COMMIT_MSG"
          if [ -n "$VERSION" ]; then
            echo "🏷️Tag：$VERSION"
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: 清理临时文件
        if: always()
        run: |
          rm -rf "${{ steps.extract.outputs.src_dir }}" 2>/dev/null || true
          echo "🧹临时文件已清理"
