name: "Git推送指定仓库"

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: '源仓库地址(完整URL，如https://github.com/user/repo.git)'
        required: true
      commit_hash:
        description: '要提取的提交哈希(留空则使用最新提交，支持短哈希)'
        required: false
        default: ''
      target_repo:
        description: '目标仓库(简写如repo，或完整格式owner/repo)'
        required: true
      version:
        description: '版本号(可选，如v1.0.0)'
        required: false
        default: ''
      create_repo:
        description: '若目标仓库不存在是否自动创建'
        required: false
        default: ''

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 确定目标仓库全称
        id: repo
        run: |
          INPUT="${{ inputs.target_repo }}"
          if [[ "$INPUT" == *"/"* ]]; then
            echo "FULL_NAME=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "FULL_NAME=${{ github.actor }}/$INPUT" >> $GITHUB_OUTPUT
          fi

      - name: 推送源码
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ steps.repo.outputs.FULL_NAME }}
          CREATE_REPO: ${{ inputs.create_repo }}
          VERSION: ${{ inputs.version }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          COMMIT_HASH: ${{ inputs.commit_hash }}
        run: |
          set -e

          OWNER=$(echo "$TARGET_REPO" | cut -d'/' -f1)
          REPO=$(echo "$TARGET_REPO" | cut -d'/' -f2)
          AUTH_URL="https://${PAT}@github.com/$TARGET_REPO.git"

          USER_INFO=$(curl -s -H "Authorization: token ${PAT}" https://api.github.com/user)
          GIT_USER_NAME=$(echo "$USER_INFO" | jq -r '.login')
          GIT_USER_ID=$(echo "$USER_INFO" | jq -r '.id')
          GIT_USER_EMAIL="${GIT_USER_ID}+${GIT_USER_NAME}@users.noreply.github.com"

          echo "👤提交身份：$GIT_USER_NAME <$GIT_USER_EMAIL>"
          echo "📤目标仓库：$TARGET_REPO"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${PAT}" "https://api.github.com/repos/$TARGET_REPO")

          if [ "$HTTP_CODE" = "404" ]; then
            if [ "$CREATE_REPO" = "true" ]; then
              echo "🏗️仓库不存在，正在创建..."
              CREATE_RESP=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/user/repos \
                -d "{\"name\":\"$REPO\", \"private\":false, \"auto_init\":false}")
              CREATE_CODE=$(echo "$CREATE_RESP" | tail -1)
              if [ "$CREATE_CODE" != "201" ]; then
                echo "❌创建仓库失败(HTTP $CREATE_CODE)"
                exit 1
              fi
              echo "✅仓库已创建"
              sleep 5
            else
              echo "❌目标仓库不存在且未开启自动创建"
              exit 1
            fi
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "✅仓库已存在"
          elif [ "$HTTP_CODE" = "401" ]; then
            echo "❌PAT_TOKEN无效或已过期"
            exit 1
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌PAT_TOKEN权限不足，需要'repo'权限"
            exit 1
          else
            echo "❌API异常(HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "📥源仓库：$SOURCE_REPO"
          TMP_CLONE=$(mktemp -d)
          cd "$TMP_CLONE"
          git init
          git remote add origin "$SOURCE_REPO"

          if [ -z "$COMMIT_HASH" ]; then
            echo "🔖使用最新提交"
            git fetch --depth 1 origin
            git checkout FETCH_HEAD
          else
            echo "🔖使用指定提交：$COMMIT_HASH"
            if [[ "$COMMIT_HASH" =~ ^[0-9a-f]{40}$ ]]; then
              FULL_HASH="$COMMIT_HASH"
              git fetch --depth 1 origin "$FULL_HASH" || {
                echo "❌无法获取提交：$FULL_HASH"
                exit 1
              }
            else
              echo "🔍正在解析短哈希..."
              git fetch --depth 1 origin "$COMMIT_HASH" 2>/dev/null || {
                git fetch --unshallow 2>/dev/null || true
                git fetch origin 2>/dev/null || true
                FULL_HASH=$(git rev-parse "$COMMIT_HASH" 2>/dev/null || echo "")
                if [ -z "$FULL_HASH" ]; then
                  echo "❌无法找到匹配的提交：$COMMIT_HASH"
                  exit 1
                fi
                echo "✅完整哈希：$FULL_HASH"
                git checkout "$FULL_HASH" 2>/dev/null || {
                  git fetch --depth 1 origin "$FULL_HASH"
                }
              }
            fi
            git checkout FETCH_HEAD 2>/dev/null || true
          fi

          echo "✅源码提取完成"

          TMP_PUSH=$(mktemp -d)
          cd "$TMP_CLONE"
          find . -mindepth 1 -maxdepth 1 -not -name '.git' | while read item; do
            cp -r "$item" "$TMP_PUSH/" 2>/dev/null || true
          done

          cd "$TMP_PUSH"
          rm -rf .git
          git init -b main
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git add .

          if [ -n "$VERSION" ]; then
            COMMIT_MSG="🚀版本 $VERSION"
          else
            COMMIT_MSG="📦源码推送"
          fi

          git commit -m "$COMMIT_MSG" || echo "⚠️无文件变更"
          git remote add origin "$AUTH_URL"
          git push -u origin main --force

          echo ""
          echo "🎉推送完成"
          echo "📤仓库：$TARGET_REPO(main)"
          echo "👤提交者：$GIT_USER_NAME"
          echo "📝信息：$COMMIT_MSG"
          echo "💡单次提交，无历史记录"
