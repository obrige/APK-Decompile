name: "APK反编译并推送源码"

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APK文件的直链（需可直接下载）'
        required: true
      target_repo:
        description: '目标仓库名（简写如myapp，会自动推送至你的用户名/myapp；或完整格式owner/repo）'
        required: true
        default: ''
      create_repo:
        description: '若目标仓库不存在是否自动创建（true/false）'
        required: false
        default: 'true'

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: 确定目标仓库全称
        id: repo
        run: |
          INPUT="${{ inputs.target_repo }}"
          if [[ "$INPUT" == *"/"* ]]; then
            echo "FULL_NAME=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "FULL_NAME=${{ github.actor }}/$INPUT" >> $GITHUB_OUTPUT
          fi

      - name: 下载APK
        run: |
          echo "⬇️正在下载 APK..."
          wget -q --show-progress -O app.apk "${{ inputs.apk_url }}" || {
            echo "❌下载失败，请检查链接是否可直接访问"
            exit 1
          }
          echo "✅下载完成"

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 用jadx反编译
        run: |
          echo "🔧 正在下载 jadx..."
          TAG=$(curl -s https://api.github.com/repos/skylot/jadx/releases/latest | sed -n 's/.*"tag_name": "\([^"]*\)".*/\1/p')
          VER="${TAG#v}"
          wget -q "https://github.com/skylot/jadx/releases/download/${TAG}/jadx-${VER}.zip" -O jadx.zip
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx
          echo "🔧 正在反编译..."
          mkdir output
          ./jadx/bin/jadx -d output app.apk || echo "⚠️部分类反编译失败（正常现象），结果仍可用"
          echo "✅反编译完成"

      - name: 推送源码到目标仓库
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ steps.repo.outputs.FULL_NAME }}
          CREATE_REPO: ${{ inputs.create_repo }}
          GIT_USER_NAME: ${{ github.actor }}
          GIT_USER_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: |
          OWNER=$(echo "$TARGET_REPO" | cut -d'/' -f1)
          REPO=$(echo "$TARGET_REPO" | cut -d'/' -f2)
          AUTH_URL="https://${{ github.actor }}:${PAT}@github.com/$TARGET_REPO.git"

          echo "📤目标仓库：$TARGET_REPO"
          echo "👤提交作者：$GIT_USER_NAME <$GIT_USER_EMAIL>"

          # 检查目标仓库是否存在
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -u "${{ github.actor }}:${PAT}" "https://api.github.com/repos/$TARGET_REPO")

          if [ "$HTTP_CODE" = "404" ]; then
            if [ "$CREATE_REPO" = "true" ]; then
              echo "🏗️ 仓库不存在，正在创建..."
              CREATE_RESP=$(curl -s -w "\n%{http_code}" -X POST -u "${{ github.actor }}:${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/user/repos \
                -d "{\"name\":\"$REPO\", \"private\":false, \"auto_init\":false}")
              CREATE_CODE=$(echo "$CREATE_RESP" | tail -1)
              CREATE_BODY=$(echo "$CREATE_RESP" | head -1)
              if [ "$CREATE_CODE" = "201" ]; then
                echo "✅仓库已创建"
                sleep 5
              elif [ "$CREATE_CODE" = "403" ]; then
                echo "❌创建仓库失败：PAT_TOKEN 权限不足"
                echo "💡请确保 PAT 具有 'repo' 权限：https://github.com/settings/tokens"
                exit 1
              else
                echo "❌创建仓库失败 (HTTP $CREATE_CODE): $CREATE_BODY"
                exit 1
              fi
            else
              echo "❌目标仓库不存在且未开启自动创建"
              exit 1
            fi
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "✅仓库已存在"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌查询仓库失败：PAT_TOKEN 权限不足"
            echo "💡请确保 PAT 具有 'repo' 权限：https://github.com/settings/tokens"
            exit 1
          else
            echo "⚠️API返回状态码：$HTTP_CODE，请检查Token权限"
            exit 1
          fi

          # 初始化并推送
          cd output
          git init
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git add .
          git commit -m "🔨初始项目提交" || echo "无新变化"
          git remote add origin "$AUTH_URL"
          git push -u origin master --force || git push -u origin main --force
          echo "🎉源码已推送至$TARGET_REPO"
